services:
  web:
    build:
      context: ./apps/web
    ports:
      - "5173:5173"

  api:
    build:
      context: ./apps/api
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - redis
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: task_management
    ports:
      - "3306:3306"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
